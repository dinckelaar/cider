<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rochebrune - Productinformatie</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            line-height: 1.5; 
            padding: 20px; 
            color: #1a1a1a; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        h1 { border-bottom: 2px solid #333; pb: 10px; font-size: 1.5rem; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px 8px; text-align: left; }
        th { background-color: #f9f9f9; font-weight: bold; }
        .allergenen { font-weight: bold; color: #d93025; }

</head>
<body>

        <thead>
            <tr>
                <th>Omschrijving</th>

            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Energie</td>

            </tr>

                <td>Vetten</td>
                <td>0 g</td>
            </tr>
            <tr>
                <td>&nbsp;&nbsp;waarvan verzadigd</td>
                <td>0 g</td>
            </tr>
            <tr>

                <td>X g</td>
            </tr>
            <tr>
                <td>&nbsp;&nbsp;waarvan suikers</td>
                <td>X g</td>
            </tr>
            <tr>
                <td>Eiwitten</td>
                <td>0 g</td>
            </tr>
            <tr>
                <td>Zout</td>
                <td>0 g</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
