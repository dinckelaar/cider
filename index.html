<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wijnmakerij Maurits van Dinckelaar | Ambachtelijke Friese Cider</title>
    <style>
        :root {
            --primary: #0a192f; 
            --accent: #5d7a51; 
            --gold: #c5a059;
            --bg: #faf9f6;
            --text: #2c2c2c;
        }
        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            color: var(--text);
            background-color: var(--bg);
            margin: 0;
            padding: 0;
        }
        header {
            background: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #eae7e0;
        }
        .logo {
            max-width: 200px;
            height: auto;
        }
        .hero {
            position: relative;
            height: 60vh;
            background: var(--primary);
            overflow: hidden;
        }
        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }
        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            width: 90%;
        }
        .hero-text h1 {
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        section {
            padding: 80px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h2 {
            color: var(--primary);
            text-align: center;
            font-size: 2rem;
            border-bottom: 2px solid var(--gold);
            display: inline-block;
            margin-bottom: 40px;
            left: 50%;
            position: relative;
            transform: translateX(-50%);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            margin-bottom: 60px;
        }
        .grid img {
            width: 100%;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .full-width-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            margin: 40px 0;
        }
